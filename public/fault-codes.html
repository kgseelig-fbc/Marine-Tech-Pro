<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0B2240">
    <title>Fault Codes — Marine Tech Pro</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/fbc-logo.jpeg">
    <link rel="apple-touch-icon" href="/icons/fbc-logo.jpeg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .top-bar-logo {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 8px;
            vertical-align: middle;
        }

        .search-container {
            margin: 0 16px 16px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 18px 14px 44px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
        }

        .search-input:focus {
            border-color: #1a3a5c;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #95a5a6;
        }

        .search-clear {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: #ddd;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .filter-row {
            display: flex;
            gap: 8px;
            margin: 0 16px 16px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 20px;
            background: #fff;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .filter-btn.active {
            background: #1a3a5c;
            color: #fff;
            border-color: #1a3a5c;
        }

        .results-count {
            margin: 0 16px 12px;
            font-size: 13px;
            color: #95a5a6;
            font-weight: 600;
        }

        .fault-card {
            background: #fff;
            margin: 0 16px 12px;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            border: 1px solid #eee;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .fault-card:active {
            border-color: #2980b9;
        }

        .fault-card.expanded {
            border-color: #1a3a5c;
        }

        .fault-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .fault-code-badge {
            background: #1a3a5c;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 800;
            font-family: 'SF Mono', 'Consolas', monospace;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .fault-code-badge.mercury { background: #1a3a5c; }
        .fault-code-badge.yamaha { background: #c0392b; }

        .fault-summary {
            flex: 1;
        }

        .fault-title {
            font-size: 15px;
            font-weight: 700;
            color: #2c3e50;
            line-height: 1.3;
        }

        .fault-brand {
            font-size: 12px;
            color: #95a5a6;
            margin-top: 2px;
        }

        .fault-expand-icon {
            font-size: 18px;
            color: #ccc;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .fault-card.expanded .fault-expand-icon {
            transform: rotate(90deg);
        }

        .fault-details {
            display: none;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #eee;
        }

        .fault-card.expanded .fault-details {
            display: block;
        }

        .detail-section {
            margin-bottom: 12px;
        }

        .detail-label {
            font-size: 12px;
            font-weight: 700;
            color: #1a3a5c;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .detail-text {
            font-size: 14px;
            color: #2c3e50;
            line-height: 1.6;
        }

        .severity-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .severity-badge.low { background: #e6f4ea; color: #1e7e34; }
        .severity-badge.medium { background: #fef3e2; color: #b8860b; }
        .severity-badge.high { background: #fde8e8; color: #c0392b; }
        .severity-badge.critical { background: #e74c3c; color: #fff; }

        .cause-list, .fix-list {
            margin: 0;
            padding: 0 0 0 16px;
            font-size: 14px;
            color: #2c3e50;
            line-height: 1.8;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #95a5a6;
        }

        .no-results-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .no-results-text {
            font-size: 16px;
            font-weight: 600;
        }

        .no-results-hint {
            font-size: 14px;
            margin-top: 8px;
        }

        .severity-filter-row {
            display: flex;
            gap: 6px;
            margin: 0 16px 16px;
            flex-wrap: wrap;
        }

        .sev-filter {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 16px;
            background: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .sev-filter.active { border-color: #1a3a5c; background: #e3f0fc; color: #1a3a5c; }
    </style>
</head>

    <!-- TOP BAR -->
    <header class="top-bar">

    <h2 class="page-title">Fault Code Lookup</h2>

    <!-- SEARCH -->

        <span class="search-icon">&#128269;</span>

    <!-- BRAND FILTER -->
    <div class="filter-row">

        <button class="filter-btn" id="filterMercury" onclick="setFilter('mercury')">Mercury</button>
        <button class="filter-btn" id="filterYamaha" onclick="setFilter('yamaha')">Yamaha</button>
    </div>

    <!-- SEVERITY FILTER -->
    <div class="severity-filter-row">

        <button class="sev-filter" onclick="setSeverity('critical')">&#128308; Critical</button>
        <button class="sev-filter" onclick="setSeverity('high')">&#128992; High</button>
        <button class="sev-filter" onclick="setSeverity('medium')">&#128993; Medium</button>

    <div class="results-count" id="resultsCount"></div>

    <!-- RESULTS -->

    </div>

    // =============================================
    // SEARCH & FILTER ENGINE
    // =============================================

    var currentFilter = 'all';
    var currentSeverity = 'all';

    document.getElementById('searchInput').addEventListener('input', renderResults);

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('searchClear').style.display = 'none';
        renderResults();
    }

    function setFilter(brand) {
        currentFilter = brand;
        document.querySelectorAll('.filter-btn').forEach(function(btn) { btn.className = 'filter-btn'; });
        document.getElementById('filter' + brand.charAt(0).toUpperCase() + brand.slice(1)).className = 'filter-btn active';
        renderResults();
    }

    function setSeverity(sev) {
        currentSeverity = sev;
        document.querySelectorAll('.sev-filter').forEach(function(btn) { btn.className = 'sev-filter'; });
        event.target.className = 'sev-filter active';
        renderResults();
    }

    function toggleCard(id) {
        var card = document.getElementById(id);
        card.classList.toggle('expanded');
    }

    var _faultSearchTimer = null;
    function mtpBeacon(kind, data) {
        try {
            fetch('/api/event', { method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ kind: kind, data: data || null }), keepalive: true }).catch(function(){});
        } catch(_){}
    }

    function renderResults() {
        var query = document.getElementById('searchInput').value.trim().toLowerCase();
        var clearBtn = document.getElementById('searchClear');
        clearBtn.style.display = query ? 'flex' : 'none';

        if (query) {
            clearTimeout(_faultSearchTimer);
            _faultSearchTimer = setTimeout(function(){
                mtpBeacon('fault_lookup', { q: query.slice(0,80), brand: currentFilter, severity: currentSeverity });
            }, 700);
        }

        var filtered = faultCodes.filter(function(fc) {
            if (currentFilter !== 'all' && fc.brand !== currentFilter) return false;
            if (currentSeverity !== 'all' && fc.severity !== currentSeverity) return false;
            if (!query) return true;
            var searchable = (fc.code + ' ' + fc.title + ' ' + fc.description + ' ' + fc.causes.join(' ') + ' ' + fc.fixes.join(' ')).toLowerCase();
            return searchable.indexOf(query) !== -1;
        });

        var countEl = document.getElementById('resultsCount');
        countEl.textContent = filtered.length + ' code' + (filtered.length !== 1 ? 's' : '') + ' found';

        if (filtered.length === 0) {
            document.getElementById('faultResults').innerHTML =
                '<div class="no-results">' +
                '<div class="no-results-icon">&#128269;</div>' +
                '<div class="no-results-text">No codes found</div>' +
                '<div class="no-results-hint">Try a different search term or adjust filters</div>' +
                '</div>';
            return;
        }

        var sevOrder = { critical: 0, high: 1, medium: 2, low: 3 };
        filtered.sort(function(a, b) {
            return (sevOrder[a.severity] || 9) - (sevOrder[b.severity] || 9);
        });

        var html = '';
        for (var i = 0; i < filtered.length; i++) {
            var fc = filtered[i];
            var cardId = 'fc_' + i;

            html += '<div class="fault-card" id="' + cardId + '" onclick="toggleCard(\'' + cardId + '\')">';
            html += '<div class="fault-header">';
            html += '<span class="fault-code-badge ' + fc.brand + '">' + fc.code + '</span>';
            html += '<div class="fault-summary">';
            html += '<div class="fault-title">' + fc.title + '</div>';
            html += '<div class="fault-brand">' + (fc.brand === 'mercury' ? 'Mercury SmartCraft' : 'Yamaha') + '</div>';
            html += '</div>';
            html += '<span class="fault-expand-icon">&#8250;</span>';
            html += '</div>';

            html += '<div class="fault-details">';

            html += '<div class="detail-section">';
            html += '<span class="severity-badge ' + fc.severity + '">' + fc.severity + '</span>';
            html += '<div class="detail-text" style="margin-top:8px;">' + fc.description + '</div>';
            html += '</div>';

            if (fc.models) {
                html += '<div class="detail-section">';
                html += '<div class="detail-label">Applies To</div>';
                html += '<div class="detail-text">' + fc.models + '</div>';
                html += '</div>';
            }

            html += '<div class="detail-section">';
            html += '<div class="detail-label">Common Causes</div>';
            html += '<ul class="cause-list">';
            for (var c = 0; c < fc.causes.length; c++) {
                html += '<li>' + fc.causes[c] + '</li>';
            }
            html += '</ul></div>';

            html += '<div class="detail-section">';
            html += '<div class="detail-label">Diagnostic Steps &amp; Fixes</div>';
            html += '<ol class="fix-list">';
            for (var f = 0; f < fc.fixes.length; f++) {
                html += '<li>' + fc.fixes[f] + '</li>';
            }
            html += '</ol></div>';

            html += '</div>';
            html += '</div>';
        }

        document.getElementById('faultResults').innerHTML = html;
    }

    renderResults();

    </script>
