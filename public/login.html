<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0B2240">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sign in — Marine Tech Pro</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/fbc-logo.jpeg">
    <link rel="apple-touch-icon" href="/icons/fbc-logo.jpeg">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .login-shake { animation: loginShake .4s ease-in-out; }
        @keyframes loginShake {
            0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
            40%{transform:translateX(8px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)}
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-card">
        <div class="brand-mark">
            <img src="/icons/fbc-logo.jpeg" alt="Freedom Boat Club">
        </div>
        <h1>Marine Tech Pro</h1>
        <div class="tagline">Authorized technicians only</div>

        <div class="field">
            <input type="password" id="loginPassword" placeholder="Access code" autocomplete="off">
        </div>
        <button class="btn-primary" onclick="attemptLogin()">Sign in</button>

        <div class="error-msg" id="loginError"></div>

        <div class="fine">
            <svg class="icon icon-sm"><use href="/icons/sprite.svg#i-lock"/></svg>
            Secure session · Freedom Boat Club
        </div>
    </div>
</div>

<script>
document.getElementById('loginPassword').focus();
document.getElementById('loginPassword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') attemptLogin();
});

function attemptLogin() {
    var input = document.getElementById('loginPassword');
    var errorMsg = document.getElementById('loginError');
    var password = input.value.trim();

    if (!password) return;

    fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: password })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
        if (data.success) {
            window.location.replace('/');
        } else {
            errorMsg.textContent = data.message || 'Invalid access code';
            input.classList.add('login-shake');
            input.value = '';
            input.focus();
            setTimeout(function() { input.classList.remove('login-shake'); }, 500);
            setTimeout(function() { errorMsg.textContent = ''; }, 3000);
        }
    })
    .catch(function() {
        errorMsg.textContent = 'Connection error — try again';
    });
}
</script>
</body>
</html>
