<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marine Tech Pro — Login</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a1628;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center;
        }
        .login-logo { font-size:48px; margin-bottom:12px; }
        .login-title { font-size:22px; font-weight:800; color:#1a3a5c; margin-bottom:4px; }
        .login-subtitle { font-size:14px; color:#7f8c8d; margin-bottom:30px; }
        .login-input {
            width:100%; padding:14px 18px; border:2px solid #ddd; border-radius:10px;
            font-size:16px; outline:none; margin-bottom:16px; text-align:center; letter-spacing:2px;
        }
        .login-input:focus { border-color:#1a3a5c; }
        .login-input.error {
            border-color:#e74c3c;
            animation: loginShake 0.4s ease-in-out;
        }
        @keyframes loginShake {
            0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)}
            40%{transform:translateX(10px)} 60%{transform:translateX(-10px)}
            80%{transform:translateX(10px)}
        }
        .login-btn {
            width:100%; padding:14px; background:#1a3a5c; color:#fff; border:none;
            border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; letter-spacing:1px;
        }
        .login-btn:active { background:#0d2137; }
        .login-error-msg { color:#e74c3c; font-size:14px; font-weight:600; margin-top:16px; min-height:20px; }
        .login-footer { margin-top:24px; font-size:12px; color:#bbb; }
        .login-remember {
            display:flex; align-items:center; justify-content:center;
            gap:8px; margin-bottom:20px; font-size:14px; color:#666;
        }
        .login-remember input { width:18px; height:18px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">⚓</div>
        <div class="login-title">Marine Tech Pro</div>
        <div class="login-subtitle">Authorized Technicians Only</div>
        <input type="password" id="loginPassword" class="login-input" placeholder="Enter access code" autocomplete="off">
        <div class="login-remember">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Keep me logged in on this device</label>
        </div>
        <button class="login-btn" onclick="attemptLogin()">ACCESS</button>
        <div class="login-error-msg" id="loginError"></div>
        <div class="login-footer">Contact admin if you need access credentials</div>
    </div>

    <script>
    // =============================================
    // PASSWORDS — change these to whatever you want
    // =============================================
    var VALID_PASSWORDS = [
        'FBC',
        'Test2026'
    ];
    var REMEMBER_DAYS = 30;

    // Check if already logged in
    window.onload = function() {
        try {
            if (sessionStorage.getItem('mtp_auth') === 'true') {
                window.location.replace('index.html');
                return;
            }
            var remembered = localStorage.getItem('mtp_auth_expires');
            if (remembered && Date.now() < parseInt(remembered)) {
                sessionStorage.setItem('mtp_auth', 'true');
                window.location.replace('index.html');
                return;
            } else if (remembered) {
                localStorage.removeItem('mtp_auth_expires');
            }
        } catch(e) {}

        document.getElementById('loginPassword').focus();
        document.getElementById('loginPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') attemptLogin();
        });
    };

    function attemptLogin() {
        var input = document.getElementById('loginPassword');
        var errorMsg = document.getElementById('loginError');
        var password = input.value.trim().toLowerCase();
        var isValid = false;

        for (var i = 0; i < VALID_PASSWORDS.length; i++) {
            if (password === VALID_PASSWORDS[i].toLowerCase()) {
                isValid = true;
                break;
            }
        }

        if (isValid) {
            sessionStorage.setItem('mtp_auth', 'true');
            if (document.getElementById('rememberMe').checked) {
                var expiresAt = Date.now() + (REMEMBER_DAYS * 24 * 60 * 60 * 1000);
                localStorage.setItem('mtp_auth_expires', expiresAt.toString());
            }
            window.location.replace('index.html');
        } else {
            errorMsg.textContent = 'Invalid access code';
            input.className = 'login-input error';
            input.value = '';
            input.focus();
            setTimeout(function() { input.className = 'login-input'; }, 500);
            setTimeout(function() { errorMsg.textContent = ''; }, 3000);
        }
    }
    </script>

    <!-- Register service worker for offline use -->
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(function(reg) {
            console.log('Service worker registered');
        }).catch(function(err) {
            console.log('Service worker failed', err);
        });
    }
    </script>
</body>
</html>
